[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "C",    # flake8-comprehensions
    "B",    # flake8-bugbear
    "UP",   # pyupgrade (upgrade syntax)
    "RUF",  # Ruff-specific rules
]
ignore = [
    "B008", # Do not perform function calls in argument defaults (fastapi Depends relies on this)
]

[tool.ruff.lint.isort]
known-first-party = ["backend", "frontend"]

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true
exclude = ["venv", ".venv", "alembic"]

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q --strict-markers"
testpaths = ["backend/tests", "frontend/tests"]
asyncio_mode = "auto"
pythonpath = ["backend", "frontend"]
