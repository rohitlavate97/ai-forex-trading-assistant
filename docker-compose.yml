services:
  # --- Database (MySQL 8.4 LTS) ---
  mysql:
    image: mysql:8.4
    container_name: forex_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-forex_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-forex_assistant}
      MYSQL_USER: ${MYSQL_USER:-forex_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-forex_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Cache & Rate Limiting (Redis) ---
  redis:
    image: redis:7-alpine
    container_name: forex_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Message Broker (RabbitMQ) ---
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: forex_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Vector Database (Qdrant) ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: forex_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- FastAPI Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forex_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - ENV=development
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - QDRANT_HOST=qdrant
      # Load other variables from host environment
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MARKET_DATA_API_KEY=${MARKET_DATA_API_KEY}
      - MARKET_DATA_PROVIDER=${MARKET_DATA_PROVIDER}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # --- Gradio Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forex_frontend
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      - ./frontend:/app
    environment:
      - FRONTEND_HOST=0.0.0.0
      - FRONTEND_PORT=7860
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

  # --- Celery Worker (Task Queue Processor) ---
  # Note: Celery worker service is configured and ready. We can uncomment this
  # once Celery task definitions are implemented in the codebase.
  # worker:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: forex_worker
  #   restart: unless-stopped
  #   command: celery -A src.core.celery worker --loglevel=info
  #   volumes:
  #     - ./backend:/app
  #   environment:
  #     - ENV=development
  #     - MYSQL_HOST=mysql
  #     - REDIS_HOST=redis
  #     - RABBITMQ_HOST=rabbitmq
  #     - QDRANT_HOST=qdrant
  #   depends_on:
  #     mysql:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     rabbitmq:
  #       condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  qdrant_data:
